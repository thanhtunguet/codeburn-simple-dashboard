worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Allow uploads up to 50 MB (matches the Go server's limit).
    client_max_body_size 50m;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;

        # ── Backend API ──────────────────────────────────────────────────────
        # Routes /users, /upload/*, and /data/*/* to the Go server.
        location ~ ^/(users|upload|data)(/.*)?$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Frontend (React SPA) ─────────────────────────────────────────────
        # Everything else goes to the nginx container that serves the built assets.
        # SPA fallback (try_files / index.html) is handled by the frontend nginx.
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
