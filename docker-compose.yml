services:
  # ── Go HTTP server ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server
    restart: unless-stopped
    volumes:
      # Persist uploaded CSV data across container restarts.
      - backend_data:/app/data
    # No ports: — only reachable by the proxy inside the Docker network.

  # ── React SPA (static files served by nginx) ───────────────────────────────
  frontend:
    build:
      context: ./dashboard
    restart: unless-stopped
    # No ports: — only reachable by the proxy inside the Docker network.
    depends_on:
      - backend

  # ── Reverse proxy (the only service exposed to the host) ───────────────────
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  backend_data:
