services:
  backend:
    build:
      context: ./server
    restart: unless-stopped
    volumes:
      # Persist uploaded CSV data across container restarts.
      - backend_data:/app/data
    expose:
      - "8080"

  frontend:
    build:
      context: ./dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
