name: CLI release

on:
  push:
    # Tag push → build + attach to release.
    tags:
      - 'v*'
    # Branch push → build-only check so compile errors surface early.
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed to create/update GitHub releases

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum

      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o codeburn-upload-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeburn-upload-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/codeburn-upload-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cli/codeburn-upload-${{ matrix.goos }}-${{ matrix.goarch }}
