server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for any path that doesn't map to a
    # real file so that client-side routing works correctly.
    # API proxying is handled by the upstream reverse proxy, not this container.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
