server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Go backend service.
    # In Docker Compose / k8s the backend container is expected to be
    # reachable at host "backend" on port 8080.
    location ~ ^/(users|upload|data)(/.*)?$ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback — unknown paths serve index.html so client-side
    # routing works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
